# Render Blueprint — 백엔드 API만 배포 (프론트는 Vercel에서 서빙)
services:
  - type: web
    name: coupang-severance-api
    runtime: python
    region: singapore

    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
